<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f7fb;
        }

        /* HEADER */

        header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* MAIN CONTAINER */

        .container {
            padding: 40px;
        }

        /* TITLE */

        h2 {
            margin-bottom: 20px;
        }

        /* PRODUCT GRID */

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* PRODUCT CARD */

        .product-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
            transition: transform .25s ease, box-shadow .25s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .product-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .product-card h3 {
            margin: 5px 0;
        }

        .price {
            font-weight: bold;
            color: #4facfe;
        }

        /* BUTTON */

        .buy-btn {
            margin-top: 10px;
            background: #4facfe;
            border: none;
            padding: 10px 15px;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            transition: .2s;
        }

        .buy-btn:hover {
            background: #3b8eea;
        }

        /* FOOTER */

        footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background: #fff;
            border-top: 1px solid #ddd;
            font-size: 14px;
        }
    </style>

</head>

<body>

    <header>
        <h1>Customer Dashboard</h1>
        <nav>
            <a href="/api/auth/customerorder">Orders</a>
            <a href="#">Profile</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <div class="container">

        <p>Welcome Customer</p>

        <h2>Products</h2>

        <div class="products">

            {% for product in products %}

            <div class="product-card">

                <img src="{{ product.image.url }}">

                <h3>{{ product.name }}</h3>

                <p>{{ product.description }}</p>

                <p class="price">Price: ₹{{ product.price }}</p>

                <button onclick="createOrder({{ product.id }})">Buy Now</button>

            </div>

            {% endfor %}

        </div>

    </div>

    <footer>
        © 2026 Customer Portal
    </footer>

        function createOrder(productId) {

            const token = localStorage.getItem("access");

            fetch("/orders/create-order/" + productId + "/", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + token
                }
            })
                .then(response => response.json())
                .then(data => {

                    console.log(data);

                    const orderId = data.order_id;

                    // start websocket for this order
                    startWebSocket(orderId);

                    // redirect to orders page
                    window.location.href = "/api/auth/customerorder/";

                });

        }


        function startWebSocket(orderId) {

            const token = localStorage.getItem("access");

            const socket = new WebSocket(
                "ws://127.0.0.1:8000/ws/orders/" + orderId + "/?token=" + token
            );

            socket.onopen = function () {
                console.log("WebSocket connected for order", orderId);
            };

            socket.onmessage = function (event) {

                const data = JSON.parse(event.data);

                alert("Order status updated to " + data.status);

            };

            socket.onclose = function () {
                console.log("WebSocket disconnected");
            };

        }

        function logout() {

            localStorage.removeItem("access");
            window.location.href = "/api/auth/logout/"

            // window.location.href = "/api/auth/login-page/";
